services:
  mysql:
    image: mysql:8.4
    container_name: taskflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: taskflow
    ports:
      - '3306:3306'
    volumes:
      - taskflow_mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-ppassword']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  adminer:
    image: adminer:4
    container_name: taskflow-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  taskflow_mysql_data:
