name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @taskflow/server db:generate
        env:
          DATABASE_URL: 'mysql://root:password@localhost:3306/taskflow'

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: taskflow
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @taskflow/server db:generate
        env:
          DATABASE_URL: 'mysql://root:password@localhost:3306/taskflow'

      - name: Run database migrations
        run: pnpm --filter @taskflow/server db:migrate:prod
        env:
          DATABASE_URL: 'mysql://root:password@localhost:3306/taskflow'

      - name: Run tests
        run: pnpm test
        env:
          NODE_ENV: test
          DATABASE_URL: 'mysql://root:password@localhost:3306/taskflow'
          JWT_ACCESS_SECRET: ci-access-secret-at-least-32-characters-long
          JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-characters-long
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          PORT: '5000'
          CORS_ORIGIN: 'http://localhost:5173'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @taskflow/server db:generate
        env:
          DATABASE_URL: 'mysql://root:password@localhost:3306/taskflow'

      - name: Build server
        run: pnpm --filter @taskflow/server build

      - name: Build client
        run: pnpm --filter @taskflow/client build
        env:
          VITE_API_URL: 'https://placeholder.onrender.com'
